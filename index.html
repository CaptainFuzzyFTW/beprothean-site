<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porthean Autonomous Intelligence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400&display=swap');
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #05040f;
            margin: 0;
            overflow: hidden;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                              radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                              radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px),
                              radial-gradient(rgba(255,255,255,.4), rgba(255,255,255,.1) 2px, transparent 30px);
            background-size: 550px 550px, 350px 350px, 250px 250px, 150px 150px;
            background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;
            animation: move-stars 300s linear infinite;
            transition: opacity 1s ease-out;
        }
        body.fading-out {
            opacity: 0;
        }
        @keyframes move-stars {
            from {background-position: 0 0, 40px 60px, 130px 270px, 70px 100px;}
            to {background-position: -10000px 5000px, -10040px 5060px, -10130px 5270px, -10070px 5100px;}
        }
        .container {
            text-align: center;
        }
        svg {
            width: 80%;
            max-width: 900px;
            height: auto;
            transform-origin: center;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .container:hover svg {
            transform: scale(1.02);
        }
        .logo-text, .motto-text {
            transition: opacity 0.5s ease;
        }
        .logo-text {
            opacity: 0;
            animation: fadeInText 2s ease-in-out 1s forwards;
        }
        .motto-text {
            opacity: 0;
            animation: fadeInSubText 2s ease-in-out 2.5s forwards;
        }
        .enter-prompt {
            opacity: 0;
            font-family: 'Exo 2', sans-serif;
            font-weight: 300;
            font-size: 1.25rem;
            color: #AAB7C4;
            letter-spacing: 5px;
            margin-top: 2rem;
            border: 1px solid #AAB7C4;
            padding: 1rem 2rem;
            cursor: pointer;
            animation: fadeInPrompt 2s ease-in-out 4s forwards;
            transition: all 0.3s ease;
        }
        .enter-prompt:hover {
            background-color: rgba(170, 183, 196, 0.1);
            border-color: #FFFFFF;
            color: #FFFFFF;
        }
        @keyframes fadeInText {
            to { opacity: 1; }
        }
        @keyframes fadeInSubText {
            to { opacity: 1; }
        }
        @keyframes fadeInPrompt {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#4A9EFF;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
                </linearGradient>
            </defs>
            
            <text x="400" y="180" font-family="'Exo 2', sans-serif" font-size="72" font-weight="400" 
                  text-anchor="middle" fill="url(#textGradient)" class="logo-text">
                PROTHEAN
            </text>
            
            <text x="400" y="240" font-family="'Exo 2', sans-serif" font-size="24" font-weight="300" 
                  text-anchor="middle" fill="#AAB7C4" letter-spacing="3" class="motto-text">
                AUTONOMOUS INTELLIGENCE NETWORK
            </text>
        </svg>
        
        <div class="enter-prompt" onclick="fadeOutAndRedirect()">
            ENTER
        </div>
    </div>
    
    <script>
        function fadeOutAndRedirect() {
            document.body.classList.add('fading-out');
            setTimeout(() => {
                window.location.href = 'main.html';
            }, 1000);
        }
    </script>
</body>
</html>
